<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Rushda</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="home-container">
           <nav class="nav">
                <h2>Luxury Hotel</h2>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#rooms">Rooms</a></li>
                    <li><a href="#booking">Booking</a></li>
                </ul>
            </nav>
        <div class="home" id="home">
            <div class="black-box">
                <h2>Luxury Stay Experience</h2>
                <p>Book premium hotel rooms with comfort and elegance.</p>
                <button class="explore">Explore Rooms</button>
            </div>
        </div>
        <h2 class="heading">Our Rooms</h2>
        <div class="Rooms" id="rooms">
            <div class="room-box">
                <img src="first.jpg" alt="">
                <h3>Single Room</h3>
                <p>2000/Night</p>
                <button class="book">Book Now</button>
            </div>
            <div class="room-box">
                <img src="second.jpg" alt="">
                <h3>Double Room</h3>
                <p>3500/Night</p>
                <button class="book">Book Now</button>
            </div>
            <div class="room-box">
                <img src="third.jpg" alt="">
                <h3>Deluxe Room</h3>
                <p>5000/Night</p>
                <button class="book">Book Now</button>
            </div>
            <div class="room-box">
                <img src="fourth.jpg" alt="">
                <h3>Luxury Room</h3>
                <p>9000/Night</p>
                <button class="book">Book Now</button>
            </div>
        </div>
        <div class="booking" id="booking">
            <h2>Book Your Room</h2>
            <input type="text" name="" placeholder="Enter Your Name">
            <input type="email" name="" placeholder="Enter Your Email">
            <input type="text" name="" placeholder="Selected Room">
            <label for="">Check In</label>
            <input type="date" name="" id="">
            <label for="">Check Out</label>
            <input type="date" name="" id="">
            <button class="book-room">Book Room</button>
        </div>

    </div>
</body>

</html>
